<!DOCTYPE html>
<html>
<head><title>Edit Clip</title></head>
<body style="font-family: sans-serif; max-width: 900px; margin: 40px auto;">
    <h1>Edit Clip</h1>
    <video id="player" src="/media/{{ subdir }}/{{ clip.filename }}" controls style="width: 100%; max-height: 500px;"></video>

    <form action="/clip/{{ clip.id }}/trim" method="post" style="margin-top: 20px;">
        <label>Start time (HH:MM:SS or seconds):
            <input type="text" name="start" value="0" required>
        </label>
        <br><br>
        <label>End time (HH:MM:SS or seconds):
            <input type="text" name="end" required>
        </label>
        <br><br>
        <button type="submit">Trim &amp; Save</button>
    </form>

    <p style="margin-top: 20px;"><a href="/">&larr; Back to library</a></p>

    <script>
        const video = document.getElementById('player');
        video.addEventListener('loadedmetadata', () => {
            document.querySelector('input[name="end"]').value = video.duration.toFixed(2);
        });
    </script>
</body>
</html>
