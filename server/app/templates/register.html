{% extends "base.html" %}
{% block title %}Create account — Endless Clips{% endblock %}
{% block body %}
{% include "_nav.html" %}
<div class="share-shell">
  <div class="auth-card">
    <span class="brand"><span class="rec-dot" aria-hidden="true"></span>Endless Clips</span>
    <p class="auth-lede">Create an account to upload, organize, and share your own clips.</p>
    <form method="post" action="/register">
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <div class="field">
        <label for="u">Username</label>
        <input id="u" class="input" style="width:100%" type="text" name="username" autocomplete="username"
               minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+" autofocus required>
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input id="p" class="input" style="width:100%" type="password" name="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="field">
        <label for="c">Confirm password</label>
        <input id="c" class="input" style="width:100%" type="password" name="confirm" autocomplete="new-password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
    <p class="auth-alt">Already have one? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}
