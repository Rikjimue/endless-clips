{% extends "base.html" %}
{% block title %}Sign in — Endless Clips{% endblock %}
{% block body %}
{% include "_nav.html" %}
<div class="share-shell">
  <div class="login-card">
    <span class="brand">Endless Clips</span>
    <form method="post" action="/login">
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <div class="field">
        <label>Username</label>
        <input class="input" style="width:100%" type="text" name="username" autofocus required>
      </div>
      <div class="field">
        <label>Password</label>
        <input class="input" style="width:100%" type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
