<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Endless Clips{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
{% block head_extra %}{% endblock %}
<style>
:root {
  --bg: #0d0e10;
  --surface: #15171a;
  --surface-2: #1e2024;
  --border: #2a2d33;
  --text: #f2f3f5;
  --text-dim: #8a8f97;
  --accent: #10b981;
  --accent-2: #34d399;
  --accent-text: #062019;
  --danger: #f87171;
  --radius: 10px;
  --radius-sm: 6px;

  --plyr-color-main: #10b981;
  --plyr-video-background: #000;
  --plyr-menu-background: #1e2024;
  --plyr-menu-color: #f2f3f5;
  --plyr-tooltip-background: #1e2024;
  --plyr-tooltip-color: #f2f3f5;
  --plyr-control-radius: 6px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

/* Topbar */
.topbar { border-bottom: 1px solid var(--border); }
.topbar-inner {
  max-width: 1320px; margin: 0 auto; padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; }
.topnav { display: flex; align-items: center; gap: 6px; }
.nav-link { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-dim); transition: color .15s, background .15s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--text); background: var(--surface-2); }
.nav-user { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); padding: 0 4px; }

.shell { max-width: 1320px; margin: 0 auto; padding: 32px 28px 60px; }

.content-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.content-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin: 0; cursor: default; }
.content-header h1.editable { cursor: pointer; border-bottom: 1px dashed transparent; }
.content-header h1.editable:hover { border-bottom-color: var(--text-dim); }
.content-header .meta { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim); }
.title-edit-row { display: flex; gap: 8px; align-items: center; }
.title-edit-row .input { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; max-width: 420px; }

.section-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin: 36px 0 14px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-title:first-of-type { margin-top: 0; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(248px, 100%), 1fr)); gap: 16px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s ease; display: flex; flex-direction: column; }
.card:hover { border-color: var(--accent); }
.thumb { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 13px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.1em; }
.card-compact .thumb { aspect-ratio: auto; height: 168px; background: #000; }
.card-compact .thumb img { object-fit: contain; }

/* Click-to-open (opens in a new tab) */
.openable { cursor: pointer; }
.play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; pointer-events: none; z-index: 2; }
.openable:hover .play-btn { opacity: 1; }
.play-btn svg { width: 54px; height: 54px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6)); }

.timecode { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.02em; background: rgba(8,9,11,0.78); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 2px 7px; color: var(--text); }
.duration-badge { position: absolute; right: 8px; bottom: 8px; backdrop-filter: blur(4px); z-index: 1; }

.vis-pill { position: absolute; left: 8px; top: 8px; z-index: 1; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: rgba(8,9,11,0.78); color: var(--text-dim); backdrop-filter: blur(4px); }
.vis-pill::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.vis-public::before { background: var(--accent); }
.vis-unlisted::before { background: #38bdf8; }
.vis-private::before { background: var(--text-dim); }

.card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; flex: 1; }
.card-title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
.card-title.renamable { cursor: text; }
.card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-dim); margin-bottom: 12px; }
.rename-inline { font-size: 14px; font-weight: 500; width: 100%; margin-bottom: 3px; }

/* Byline */
.byline { display: flex; align-items: center; gap: 7px; margin-top: auto; padding-top: 11px; font-size: 12.5px; color: var(--text-dim); }
.byline .who { color: var(--text); font-weight: 600; }
.avatar { width: 20px; height: 20px; border-radius: 50%; flex: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
.avatar.anon { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

/* Aligned card actions */
.actions { display: flex; gap: 8px; margin-top: 12px; }
.actions > *, .actions form { flex: 1; min-width: 0; }
.actions .btn, .actions form .btn { width: 100%; }
.vis-control { display: flex; gap: 4px; margin-top: 8px; }
.vis-control form { flex: 1; }
.vis-control .btn { width: 100%; padding: 5px 6px; font-size: 11.5px; text-transform: capitalize; }
.vis-control .btn[aria-pressed="true"] { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.vis-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 6px; display: block; }
form { margin: 0; }

.btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s ease; line-height: 1.2; }
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-primary:hover { background: var(--accent-2); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border-color: var(--border); color: var(--danger); }
.btn-danger:hover { border-color: var(--danger); background: rgba(248,113,113,0.08); }
.btn-sm { padding: 6px 11px; font-size: 12px; }
.btn-block { width: 100%; justify-content: center; }

.empty { border: 1px dashed var(--border); border-radius: var(--radius); padding: 38px 24px; text-align: center; color: var(--text-dim); font-size: 14px; line-height: 1.55; }
.empty a { color: var(--accent); }
.banner { border: 1px solid var(--danger); background: rgba(248,113,113,0.08); color: #ffb3b3; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

/* Editor */
.editor-layout { display: grid; grid-template-columns: 1fr 300px; gap: 22px; }
@media (max-width: 960px) { .editor-layout { grid-template-columns: 1fr; } }
.main-col { display: flex; flex-direction: column; gap: 14px; }
.player-wrap { background: #000; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.player-wrap .plyr { border-radius: var(--radius); }
.plyr--video .plyr__controls { padding: 8px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; height: fit-content; }
.panel h2 { font-family: 'Space Grotesk', sans-serif; font-size: 14px; margin: 0 0 14px; }
.panel + .panel { margin-top: 16px; }
.share-link-box { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; word-break: break-all; color: var(--text); margin-bottom: 10px; }

/* Trim timeline */
.trim-times { display: flex; justify-content: space-between; }
.trim-timeline { position: relative; height: 52px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; user-select: none; overflow: hidden; }
.trim-buffered { position: absolute; top: 0; bottom: 0; left: 0; width: 0%; background: rgba(255,255,255,0.05); }
.trim-selection { position: absolute; top: 0; bottom: 0; background: rgba(16,185,129,0.16); border-left: 1px solid var(--accent); border-right: 1px solid var(--accent); }
.trim-handle { position: absolute; top: -4px; bottom: -4px; width: 14px; margin-left: -7px; background: var(--accent); border-radius: 4px; cursor: ew-resize; touch-action: none; z-index: 2; }
.trim-handle::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 2px; height: 16px; background: var(--accent-text); border-radius: 1px; }
.trim-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; opacity: 0.55; pointer-events: none; z-index: 1; }

/* Share pages */
.share-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.share-media { max-width: 1100px; width: 100%; }
.share-media .plyr { border-radius: var(--radius); border: 1px solid var(--border); }
.share-media .plyr--video, .share-media video, .share-media img { max-height: 82vh; }
.share-media img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); display: block; margin: 0 auto; object-fit: contain; width: auto; }
.share-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; text-align: center; }
.share-meta { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.share-download { margin-top: 16px; text-align: center; }
.share-brand { margin-top: 18px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

/* Inputs / auth */
.input { font-family: 'Inter', sans-serif; font-size: 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px; }
.input::placeholder { color: var(--text-dim); }
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16,185,129,0.14); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; max-width: 380px; width: 100%; }
.auth-card .brand { display: block; margin-bottom: 6px; font-size: 16px; }
.auth-lede { color: var(--text-dim); font-size: 13.5px; margin: 0 0 22px; }
.auth-alt { margin-top: 18px; font-size: 13px; color: var(--text-dim); text-align: center; }
.auth-alt a { color: var(--accent); font-weight: 600; }
.login-error { background: rgba(248,113,113,0.08); border: 1px solid var(--danger); color: #ffb3b3; border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; margin-bottom: 16px; }

/* Dropzone + progress */
.dropzone { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 40px 24px; text-align: center; color: var(--text-dim); cursor: pointer; transition: border-color .15s, color .15s, background .15s; margin-bottom: 24px; }
.dropzone:hover { border-color: var(--accent); }
.dropzone.dragover { border-color: var(--accent); color: var(--text); background: rgba(16,185,129,0.05); }
.dropzone strong { color: var(--text); }
.upload-progress-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.upload-progress-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.up-row { display: flex; justify-content: space-between; gap: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); }
.up-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.up-pct.done { color: var(--accent); }
.up-pct.failed { color: var(--danger); }
.progress { height: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; margin-top: 8px; }
.progress > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .15s ease; }

/* Visibility dropdown */
.vis-select { margin-top: 10px; }
.vis-select select { width: 100%; font-family: 'Inter', sans-serif; font-size: 12.5px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 7px 10px; cursor: pointer; }
.vis-select select:focus { outline: none; border-color: var(--accent); }

/* Full-page drag-to-upload overlay */
.drop-overlay { position: fixed; inset: 16px; border: 2px dashed var(--accent); border-radius: var(--radius); background: rgba(13,14,16,0.86); display: none; align-items: center; justify-content: center; z-index: 3000; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 20px; pointer-events: none; }
.drop-overlay.show { display: flex; }

/* Screenshot lightbox (in-page window) */
.lightbox { position: fixed; inset: 0; background: rgba(8,9,11,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 2500; padding: 28px; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 78vh; object-fit: contain; border: 1px solid var(--border); border-radius: var(--radius); background: #000; }
.lightbox-bar { display: flex; gap: 8px; }
.lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 26px; line-height: 1; color: var(--text-dim); background: none; border: none; cursor: pointer; }
.lightbox-close:hover { color: var(--text); }

.kbd-hint { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
.kbd { font-family: "JetBrains Mono", "IBM Plex Mono", monospace; font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--text); }

/* Toast (bottom) */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; opacity: 0; transition: all 0.2s ease; pointer-events: none; z-index: 1000; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Dropdown notification (top) */
.dropnote { position: fixed; top: 0; left: 50%; transform: translate(-50%, -130%); background: var(--surface-2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 10px 18px; font-size: 13px; z-index: 1500; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 28px -12px rgba(0,0,0,0.7); transition: transform .25s ease; }
.dropnote.show { transform: translate(-50%, 0); }
.dropnote .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Push notifications (e.g. clips/screenshots arriving from the capture PC) */
.notif-stack { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 1600; width: 300px; max-width: calc(100vw - 32px); }
.notif { background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: 0 12px 30px -14px rgba(0,0,0,0.75); animation: notif-in .2s ease; }
@keyframes notif-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
.notif .nt { font-size: 13px; margin-bottom: 9px; line-height: 1.4; }
.notif .nt .nname { color: var(--text-dim); }
.notif .na { display: flex; gap: 8px; }
.notif .na .btn { flex: 1; }

@media (max-width: 600px) {
  .topbar-inner { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
  .shell { padding: 22px 16px 56px; }
  .content-header h1 { font-size: 20px; }
  .editor-layout { grid-template-columns: 1fr; }
  .nav-user { display: none; }
}
</style>
</head>
<body>
{% block body %}{% endblock %}

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
  <img alt="Screenshot">
  <div class="lightbox-bar"></div>
</div>

<script>
window.CLIPS_AUTH = {{ 'true' if authenticated else 'false' }};

/* ---- Notifications ---- */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}
function showDropnote(msg, spinning) {
  let n = document.getElementById('dropnote');
  if (!n) { n = document.createElement('div'); n.id = 'dropnote'; n.className = 'dropnote';
    n.innerHTML = '<span class="spinner"></span><span class="msg"></span>'; document.body.appendChild(n); }
  n.querySelector('.spinner').style.display = spinning ? 'inline-block' : 'none';
  n.querySelector('.msg').textContent = msg;
  n.classList.add('show');
}
function hideDropnote() { const n = document.getElementById('dropnote'); if (n) n.classList.remove('show'); }

/* ---- Clipboard ---- */
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta); if (cb) cb();
}
function copyToClipboard(text) {
  const done = () => showToast('Link copied');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}

/* ---- Open in a new tab (clips & files) / lightbox (screenshots) ---- */
function enableOpenable() {
  document.querySelectorAll('.openable[data-href]').forEach((el) => {
    el.addEventListener('click', () => window.open(el.dataset.href, '_blank', 'noopener'));
  });
  document.querySelectorAll('.lightboxable[data-full]').forEach((el) => {
    el.addEventListener('click', () => openLightbox(el.dataset.full, { link: el.dataset.link }));
  });
}
function openLightbox(src, opts) {
  opts = opts || {};
  const lb = document.getElementById('lightbox');
  lb.querySelector('img').src = src;
  const bar = lb.querySelector('.lightbox-bar');
  bar.innerHTML = '';
  if (opts.link) {
    const link = opts.link.indexOf('http') === 0 ? opts.link : (location.origin + opts.link);
    const copy = document.createElement('button');
    copy.className = 'btn btn-outline btn-sm'; copy.textContent = 'Copy link';
    copy.onclick = () => copyToClipboard(link);
    const open = document.createElement('a');
    open.className = 'btn btn-primary btn-sm'; open.href = link; open.target = '_blank'; open.rel = 'noopener';
    open.textContent = 'Open page';
    bar.appendChild(copy); bar.appendChild(open);
  }
  lb._reload = !!opts.reloadOnClose;
  lb.classList.add('show');
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (!lb) return;
  lb.classList.remove('show');
  lb.querySelector('img').src = '';
  if (lb._reload) { lb._reload = false; location.reload(); }
}
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

/* ---- Double-click to rename ---- */
function enableInlineRename() {
  document.querySelectorAll('.card-title.renamable').forEach((t) => {
    t.title = 'Double-click to rename';
    t.addEventListener('dblclick', () => startRename(t));
  });
}
function startRename(t) {
  const id = t.dataset.id, kind = t.dataset.kind, current = t.textContent.trim();
  const input = document.createElement('input');
  input.className = 'input rename-inline'; input.value = current;
  t.replaceWith(input); input.focus(); input.select();
  let done = false;
  const finish = async (save) => {
    if (done) return; done = true;
    let name = current;
    if (save) {
      const v = input.value.trim();
      const fd = new FormData(); fd.append('name', v);
      const url = kind === 'clip' ? `/clip/${id}/rename`
        : (kind === 'image' ? `/image/${id}/rename` : `/uploads/${id}/rename`);
      try {
        const res = await fetch(url, { method: 'POST', body: fd });
        if (res.ok) { const d = await res.json(); name = d.name || v || current; showToast('Renamed'); }
        else { showToast(res.status === 403 ? "That's not yours to rename" : 'Rename failed'); }
      } catch (e) { showToast('Rename failed'); }
    }
    const nt = document.createElement('div');
    nt.className = 'card-title renamable'; nt.dataset.id = id; nt.dataset.kind = kind; nt.textContent = name;
    input.replaceWith(nt);
    nt.title = 'Double-click to rename';
    nt.addEventListener('dblclick', () => startRename(nt));
  };
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    if (e.key === 'Escape') finish(false);
  });
  input.addEventListener('blur', () => finish(true));
}

/* ---- Upload (small button + drag anywhere on the page) ---- */
function uploadFile(file, list, onDone) {
  const item = document.createElement('div');
  item.className = 'upload-progress-item';
  item.innerHTML = '<div class="up-row"><span class="up-name"></span><span class="up-pct">0%</span></div><div class="progress"><i></i></div>';
  item.querySelector('.up-name').textContent = file.name;
  list.appendChild(item);
  const bar = item.querySelector('.progress > i');
  const pct = item.querySelector('.up-pct');
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/uploads/add');
  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) { const p = Math.round((e.loaded / e.total) * 100); bar.style.width = p + '%'; pct.textContent = p + '%'; }
  };
  xhr.onload = () => {
    let data = null; try { data = JSON.parse(xhr.responseText); } catch (e) {}
    if (xhr.status === 200) { bar.style.width = '100%'; pct.textContent = 'Done'; pct.className = 'up-pct done'; }
    else { pct.textContent = xhr.status === 413 ? 'Too large' : (xhr.status === 401 ? 'Sign in' : 'Failed'); pct.className = 'up-pct failed'; }
    onDone(data, xhr.status);
  };
  xhr.onerror = () => { pct.textContent = 'Failed'; pct.className = 'up-pct failed'; onDone(null, 0); };
  const fd = new FormData(); fd.append('file', file); xhr.send(fd);
}

function setupUpload() {
  const input = document.getElementById('upload-input');
  if (!input) return;  // upload not enabled on this page
  const list = document.getElementById('upload-progress-list');
  const overlay = document.getElementById('drop-overlay');
  const hasFiles = (e) => e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');

  input.addEventListener('change', () => handle(input.files));
  let depth = 0;
  window.addEventListener('dragenter', (e) => { if (hasFiles(e)) { depth++; if (overlay) overlay.classList.add('show'); } });
  window.addEventListener('dragover', (e) => { if (hasFiles(e)) e.preventDefault(); });
  window.addEventListener('dragleave', () => { depth = Math.max(0, depth - 1); if (depth === 0 && overlay) overlay.classList.remove('show'); });
  window.addEventListener('drop', (e) => {
    if (!hasFiles(e)) return;
    e.preventDefault(); depth = 0; if (overlay) overlay.classList.remove('show');
    handle(e.dataTransfer.files);
  });

  function handle(files) {
    if (!files.length) return;
    let remaining = files.length, lastData = null, anyFail = false;
    showDropnote(files.length > 1 ? `Uploading ${files.length} files…` : `Uploading ${files[0].name}…`, true);
    [...files].forEach((file) => uploadFile(file, list, (data, status) => {
      if (status !== 200) anyFail = true; else lastData = data;
      if (--remaining === 0) {
        showDropnote(anyFail ? 'Some uploads failed' : 'Upload complete', false);
        setTimeout(hideDropnote, 2000);
        if (anyFail) return;
        if (files.length === 1 && lastData) {
          if (lastData.kind === 'clip') { window.location.href = lastData.edit; }            // video -> trim editor
          else if (lastData.kind === 'image') { openLightbox(lastData.src, { link: lastData.view, reloadOnClose: true }); }  // screenshot -> window
          else { window.location.href = lastData.view; }                                       // file / anon video -> view
        } else {
          setTimeout(() => location.reload(), 500);
        }
      }
    }));
  }
}
function triggerUpload() { const i = document.getElementById('upload-input'); if (i) i.click(); }

/* ---- Push notifications (capture-PC uploads) ---- */
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function showNotif(item) {
  let stack = document.getElementById('notif-stack');
  if (!stack) { stack = document.createElement('div'); stack.id = 'notif-stack'; stack.className = 'notif-stack'; document.body.appendChild(stack); }
  const el = document.createElement('div'); el.className = 'notif';
  const label = item.kind === 'clip' ? 'New clip ready' : (item.kind === 'image' ? 'New screenshot' : 'New upload');
  const nt = document.createElement('div'); nt.className = 'nt';
  nt.innerHTML = '<strong>' + label + '</strong><br><span class="nname">' + escapeHtml(item.name) + '</span>';
  const na = document.createElement('div'); na.className = 'na';
  const act = document.createElement('button'); act.className = 'btn btn-primary btn-sm';
  if (item.kind === 'image') {
    act.textContent = 'View';
    act.onclick = () => { openLightbox(item.src, { link: item.url }); el.remove(); };
  } else {
    act.textContent = item.kind === 'clip' ? 'Open editor' : 'Open';
    act.onclick = () => { window.open(item.url, '_blank', 'noopener'); el.remove(); };
  }
  const dis = document.createElement('button'); dis.className = 'btn btn-outline btn-sm'; dis.textContent = 'Dismiss';
  dis.onclick = () => el.remove();
  na.appendChild(act); na.appendChild(dis);
  el.appendChild(nt); el.appendChild(na); stack.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 20000);
}
function startNotifications() {
  if (!window.CLIPS_AUTH) return;
  let lastId = null, stopped = false;
  async function poll() {
    if (stopped) return;
    try {
      const url = lastId === null ? '/notifications/poll' : '/notifications/poll?after=' + lastId;
      const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (r.redirected || r.status === 401) { stopped = true; return; }  // session ended
      const d = await r.json();
      if (lastId !== null && d.items) d.items.forEach(showNotif);
      lastId = d.last;
    } catch (e) { /* transient: try again next tick */ }
  }
  poll();
  setInterval(poll, 4000);
}

document.addEventListener('DOMContentLoaded', () => {
  enableOpenable();
  enableInlineRename();
  setupUpload();
  startNotifications();
});
</script>
