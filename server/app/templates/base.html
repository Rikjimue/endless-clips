<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Endless Clips{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
{% block head_extra %}{% endblock %}
<style>
:root {
  --bg: #0a0e0d;
  --surface: #121815;
  --surface-2: #1a221e;
  --border: #233029;
  --text: #eaf2ef;
  --text-dim: #7f9c93;
  --emerald: #34d399;
  --emerald-dim: #1f7a5c;
  --radius: 12px;
  --radius-sm: 8px;

  --plyr-color-main: #34d399;
  --plyr-video-background: #000;
  --plyr-menu-background: #1a221e;
  --plyr-menu-color: #eaf2ef;
  --plyr-tooltip-background: #1a221e;
  --plyr-tooltip-color: #eaf2ef;
  --plyr-control-radius: 8px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% -20%, rgba(52,211,153,0.06), transparent 60%);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

.shell { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }

.page-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.wordmark {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px;
  letter-spacing: 0.02em; display: flex; align-items: center; gap: 10px;
}
.wordmark .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--emerald);
  box-shadow: 0 0 8px var(--emerald); animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.header-actions { display: flex; align-items: center; gap: 16px; }
.page-header .meta { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim); }

.section-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin: 40px 0 16px;
}
.section-title:first-of-type { margin-top: 0; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: border-color 0.15s ease;
}
.card:hover { border-color: var(--emerald-dim); }
.thumb { position: relative; aspect-ratio: 16/9; background: var(--surface-2); overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 28px;
}

.timecode {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.04em;
  background: rgba(10,14,13,0.75); border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 8px; color: var(--emerald); text-shadow: 0 0 10px rgba(52,211,153,0.4);
}
.duration-badge { position: absolute; right: 8px; bottom: 8px; backdrop-filter: blur(4px); }

.status-pill {
  position: absolute; left: 8px; top: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; padding: 3px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: rgba(10,14,13,0.75);
  backdrop-filter: blur(4px); display: flex; align-items: center; gap: 6px;
}
.status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
.status-raw::before { background: #facc15; }
.status-edited::before { background: #38bdf8; }
.status-published::before { background: var(--emerald); }

.card-body { padding: 14px 16px 16px; }
.card-title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
.card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.card-actions { display: flex; gap: 8px; }
.card-actions .btn, .card-actions form { flex: 1; }
form { margin: 0; }
form .btn { width: 100%; justify-content: center; }

.btn {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid transparent;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s ease;
}
.btn-primary { background: var(--emerald); color: #06231a; }
.btn-primary:hover { background: #5eead4; }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--emerald-dim); color: var(--emerald); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.empty {
  border: 1px dashed var(--border); border-radius: var(--radius); padding: 48px 24px;
  text-align: center; color: var(--text-dim); font-size: 14px;
}

.editor-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
@media (max-width: 860px) { .editor-layout { grid-template-columns: 1fr; } }
.main-col { display: flex; flex-direction: column; gap: 16px; }

.player-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.player-wrap .plyr { border-radius: var(--radius); }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; height: fit-content; }
.panel h2 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; margin: 0 0 16px; }
.btn-block { width: 100%; justify-content: center; }
.share-link-box {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px;
  word-break: break-all; color: var(--emerald); margin-bottom: 10px;
}
.back-link { display: inline-block; margin-bottom: 20px; font-size: 13px; color: var(--text-dim); }
.back-link:hover { color: var(--emerald); }

/* Trim timeline */
.trim-times { display: flex; justify-content: space-between; }
.trim-timeline {
  position: relative; height: 56px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; user-select: none;
}
.trim-selection {
  position: absolute; top: 0; bottom: 0;
  background: rgba(52,211,153,0.18);
  border-left: 1px solid var(--emerald); border-right: 1px solid var(--emerald);
}
.trim-handle {
  position: absolute; top: -4px; bottom: -4px; width: 14px; margin-left: -7px;
  background: var(--emerald); border-radius: 4px; cursor: ew-resize;
  box-shadow: 0 0 12px rgba(52,211,153,0.5); touch-action: none;
}
.trim-handle::after {
  content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 2px; height: 16px; background: #06231a; border-radius: 1px;
}
.trim-playhead {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: #fff; opacity: 0.6; pointer-events: none;
}

/* Share page */
.share-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.share-media { max-width: 1100px; width: 100%; }
.share-media .plyr { border-radius: var(--radius); border: 1px solid var(--border); }
.share-media img { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); display: block; }
.share-brand {
  margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase;
}
.share-brand .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); margin-right: 6px; }

/* Login */
.input {
  width: 100%; font-family: 'Inter', sans-serif; font-size: 14px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 10px 12px;
}
.input:focus { outline: none; border-color: var(--emerald-dim); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 360px; width: 100%; }
.login-card .wordmark { justify-content: center; margin-bottom: 24px; }
.login-error {
  background: rgba(248,113,113,0.1); border: 1px solid #f87171; color: #f87171;
  border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; margin-bottom: 16px;
}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
