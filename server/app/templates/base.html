<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Endless Clips{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
{% block head_extra %}{% endblock %}
<style>
:root {
  --bg: #14141c;
  --surface: #1c1d28;
  --surface-2: #23253550;
  --panel: #1f2030;
  --border: #313449;
  --border-soft: #282a3c;
  --text: #edeef3;
  --text-dim: #8b8fa6;
  --accent: #ff6a3d;          /* signal orange — the one bold thing */
  --accent-2: #ff855f;
  --accent-text: #1c0a03;
  --info: #6c97ff;            /* electric blue for links/status */
  --good: #45d39a;
  --warn: #ffc857;
  --danger: #ff6b6b;
  --radius: 9px;
  --radius-sm: 6px;

  --plyr-color-main: #ff6a3d;
  --plyr-video-background: #000;
  --plyr-menu-background: #1f2030;
  --plyr-menu-color: #edeef3;
  --plyr-tooltip-background: #1f2030;
  --plyr-tooltip-color: #edeef3;
  --plyr-control-radius: 6px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(255,106,61,0.06), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  letter-spacing: -0.005em;
}
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }
::selection { background: rgba(255,106,61,0.28); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

/* Topbar */
.topbar { border-bottom: 1px solid var(--border-soft); background: rgba(20,20,28,0.6); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50; }
.topbar-inner {
  max-width: 1320px; margin: 0 auto; padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand {
  font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 17px;
  letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 9px;
}
.rec-dot {
  width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 0 rgba(255,106,61,0.6); animation: rec 2.4s ease-out infinite; flex: none;
}
@keyframes rec {
  0% { box-shadow: 0 0 0 0 rgba(255,106,61,0.55); }
  70% { box-shadow: 0 0 0 7px rgba(255,106,61,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,106,61,0); }
}
.topnav { display: flex; align-items: center; gap: 4px; }
.nav-link {
  padding: 7px 13px; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500; color: var(--text-dim); transition: color .15s, background .15s;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--text); background: var(--surface); box-shadow: inset 0 -2px 0 var(--accent); }
.nav-user { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); padding: 0 4px; }

.shell { max-width: 1320px; margin: 0 auto; padding: 30px 28px 64px; }

.content-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 22px; gap: 16px; flex-wrap: wrap;
}
.content-header h1 {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 26px; font-weight: 700;
  letter-spacing: -0.025em; margin: 0; cursor: default;
}
.content-header h1.editable { cursor: pointer; border-bottom: 1px dashed transparent; }
.content-header h1.editable:hover { border-bottom-color: var(--text-dim); }
.content-header .meta { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text-dim); }
.title-edit-row { display: flex; gap: 8px; align-items: center; }
.title-edit-row .input { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; max-width: 440px; }

.section-title {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.14em;
  margin: 34px 0 14px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }
.section-title:first-of-type { margin-top: 0; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(248px, 100%), 1fr)); gap: 16px; }

.card {
  background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius);
  overflow: hidden; transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
}
.card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: 0 12px 30px -16px rgba(0,0,0,0.7); }
.thumb { position: relative; aspect-ratio: 16/9; background: #0c0c12; overflow: hidden; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 13px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em;
}
.card-compact .thumb { aspect-ratio: auto; height: 168px; background: #0c0c12; }
.card-compact .thumb img { object-fit: contain; }

/* Hover-to-play tile (library) */
.tile { cursor: pointer; }
.tile .hover-video {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity .18s ease; background: #000;
}
.tile.playing .hover-video { opacity: 1; }
.tile .play-hint {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 1;
}
.tile:hover .play-hint { opacity: 1; }
.tile.playing .play-hint { opacity: 0; }
.play-hint svg { width: 46px; height: 46px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }

.timecode {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: 0.01em;
  background: rgba(8,8,12,0.78); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 2px 7px; color: var(--text);
}
.duration-badge { position: absolute; right: 8px; bottom: 8px; backdrop-filter: blur(4px); z-index: 2; }

.card-body { padding: 12px 14px 14px; }
.card-title { font-size: 14.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
.card-meta { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-dim); margin-bottom: 12px; }

/* Byline (uploader) */
.byline { display: flex; align-items: center; gap: 7px; margin-top: 11px; font-size: 12.5px; color: var(--text-dim); }
.byline .who { color: var(--text); font-weight: 600; }
.avatar {
  width: 20px; height: 20px; border-radius: 50%; flex: none;
  background: linear-gradient(135deg, var(--accent), var(--info)); color: var(--accent-text);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; font-family: 'Bricolage Grotesque', sans-serif;
}
.avatar.anon { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }

.card-actions { display: flex; gap: 8px; }
.card-actions .btn, .card-actions form { flex: 1; }
.card-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.card-actions-grid .btn, .card-actions-grid form { width: 100%; }
form { margin: 0; }
form .btn { width: 100%; justify-content: center; }

.btn {
  font-family: 'Hanken Grotesk', sans-serif; font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid transparent;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s ease; line-height: 1.2;
}
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-primary:hover { background: var(--accent-2); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border-color: var(--border); color: var(--danger); }
.btn-danger:hover { border-color: var(--danger); background: rgba(255,107,107,0.09); }
.btn-sm { padding: 6px 11px; font-size: 12px; }
.btn-block { width: 100%; justify-content: center; }

.empty {
  border: 1px dashed var(--border); border-radius: var(--radius); padding: 38px 24px;
  text-align: center; color: var(--text-dim); font-size: 14px; line-height: 1.55;
}
.empty a { color: var(--accent); }

.banner {
  border: 1px solid var(--danger); background: rgba(255,107,107,0.09); color: #ffb3b3;
  border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
}

/* Editor */
.editor-layout { display: grid; grid-template-columns: 1fr 300px; gap: 22px; }
@media (max-width: 960px) { .editor-layout { grid-template-columns: 1fr; } }
.main-col { display: flex; flex-direction: column; gap: 14px; }
.player-wrap { background: #000; border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; }
.player-wrap .plyr { border-radius: var(--radius); }
.plyr--video .plyr__controls { padding: 8px; }

.panel { background: var(--panel); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 18px; height: fit-content; }
.panel h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 15px; font-weight: 700; margin: 0 0 14px; letter-spacing: -0.01em; }
.panel + .panel { margin-top: 16px; }
.share-link-box {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px;
  word-break: break-all; color: var(--info); margin-bottom: 10px;
}

/* Trim timeline */
.trim-times { display: flex; justify-content: space-between; }
.trim-timeline {
  position: relative; height: 54px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; user-select: none; overflow: hidden;
}
.trim-buffered { position: absolute; top: 0; bottom: 0; left: 0; width: 0%; background: rgba(255,255,255,0.05); }
.trim-selection { position: absolute; top: 0; bottom: 0; background: rgba(255,106,61,0.16); border-left: 1px solid var(--accent); border-right: 1px solid var(--accent); }
.trim-handle {
  position: absolute; top: -4px; bottom: -4px; width: 14px; margin-left: -7px;
  background: var(--accent); border-radius: 4px; cursor: ew-resize; touch-action: none; z-index: 2;
}
.trim-handle::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 2px; height: 18px; background: var(--accent-text); border-radius: 1px; }
.trim-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; opacity: 0.6; pointer-events: none; z-index: 1; }

/* Share pages */
.share-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.share-media { max-width: 1100px; width: 100%; }
.share-media .plyr { border-radius: var(--radius); border: 1px solid var(--border-soft); }
.share-media .plyr--video, .share-media video, .share-media img { max-height: 82vh; }
.share-media img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border-soft); display: block; margin: 0 auto; object-fit: contain; width: auto; }
.share-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; text-align: center; letter-spacing: -0.01em; }
.share-meta { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.share-download { margin-top: 16px; text-align: center; }
.share-brand {
  margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}

/* Inputs */
.input {
  font-family: 'Hanken Grotesk', sans-serif; font-size: 14px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 10px 12px;
}
.input::placeholder { color: var(--text-dim); }
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,106,61,0.14); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

/* Auth */
.auth-card {
  background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius);
  padding: 30px; max-width: 380px; width: 100%;
  box-shadow: 0 24px 60px -28px rgba(0,0,0,0.8);
}
.auth-card .brand { display: inline-flex; margin-bottom: 6px; font-size: 18px; }
.auth-lede { color: var(--text-dim); font-size: 13.5px; margin: 0 0 22px; }
.auth-alt { margin-top: 18px; font-size: 13px; color: var(--text-dim); text-align: center; }
.auth-alt a { color: var(--accent); font-weight: 600; }
.login-error {
  background: rgba(255,107,107,0.09); border: 1px solid var(--danger); color: #ffb3b3;
  border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; margin-bottom: 16px;
}

/* Dropzone */
.dropzone {
  border: 1.5px dashed var(--border); border-radius: var(--radius);
  padding: 40px 24px; text-align: center; color: var(--text-dim);
  cursor: pointer; transition: border-color .15s, color .15s, background .15s; margin-bottom: 26px;
}
.dropzone:hover { border-color: var(--accent); }
.dropzone.dragover { border-color: var(--accent); color: var(--text); background: rgba(255,106,61,0.05); }
.dropzone strong { color: var(--text); }
.upload-progress-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.upload-progress-item {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
  padding: 8px 10px; display: flex; justify-content: space-between; gap: 12px;
}
.upload-progress-item .done { color: var(--good); }
.upload-progress-item .failed { color: var(--danger); }

/* Visibility */
.vis-pill {
  position: absolute; right: 8px; top: 8px; z-index: 2;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 3px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(8,8,12,0.78); color: var(--text-dim);
  backdrop-filter: blur(4px);
}
.vis-pill::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.vis-public::before { background: var(--accent); }
.vis-unlisted::before { background: var(--info); }
.vis-private::before { background: var(--text-dim); }
.vis-control { display: inline-flex; gap: 4px; flex-wrap: wrap; }
.vis-control form { flex: 0 0 auto; }
.vis-control .btn { padding: 5px 10px; font-size: 11.5px; text-transform: capitalize; }
.vis-control .btn[aria-pressed="true"] { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.vis-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 6px; display: block; font-weight: 600; }
.kbd-hint { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.2s ease; pointer-events: none; z-index: 1000;
  box-shadow: 0 10px 30px -12px rgba(0,0,0,0.7);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(8,8,12,0.6);
  display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px;
  backdrop-filter: blur(3px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; width: 100%; max-width: 360px;
}
.modal h3 { margin: 0 0 12px; font-family: 'Bricolage Grotesque', sans-serif; font-size: 16px; font-weight: 700; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.modal-actions .btn { min-width: 84px; }

@media (max-width: 600px) {
  .topbar-inner { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .shell { padding: 22px 16px 56px; }
  .content-header h1 { font-size: 22px; }
  .editor-layout { grid-template-columns: 1fr; }
  .nav-link { padding: 6px 10px; font-size: 12.5px; }
  .nav-user { display: none; }
}
@media (max-width: 400px) {
  .card-actions, .card-actions-grid { gap: 6px; }
  .btn { font-size: 12px; padding: 7px 10px; }
}
</style>
</head>
<body>
{% block body %}{% endblock %}

<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <h3>Rename</h3>
    <input class="input" id="rename-input" style="width: 100%;">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeRenameModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitRenameModal()">Save</button>
    </div>
  </div>
</div>

<script>
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  if (cb) cb();
}
function copyToClipboard(text) {
  const done = () => showToast('Link copied');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}

/* ---- Rename modal ---- */
let _renameTarget = null;
function openRename(id, currentName, kind, cardEl) {
  _renameTarget = { id, kind, cardEl };
  const input = document.getElementById('rename-input');
  input.value = currentName;
  document.getElementById('rename-modal').classList.add('show');
  setTimeout(() => { input.focus(); input.select(); }, 0);
}
function closeRenameModal() {
  document.getElementById('rename-modal').classList.remove('show');
  _renameTarget = null;
}
async function submitRenameModal() {
  if (!_renameTarget) return;
  const name = document.getElementById('rename-input').value;
  const url = _renameTarget.kind === 'clip'
    ? `/clip/${_renameTarget.id}/rename` : `/uploads/${_renameTarget.id}/rename`;
  const formData = new FormData();
  formData.append('name', name);
  const res = await fetch(url, { method: 'POST', body: formData });
  if (res.ok) {
    const data = await res.json();
    if (_renameTarget.cardEl) {
      const titleEl = _renameTarget.cardEl.querySelector('.card-title');
      if (titleEl) titleEl.textContent = data.name || titleEl.dataset.fallback || titleEl.textContent;
    }
    showToast('Renamed');
  } else { showToast(res.status === 403 ? "That's not yours to rename" : 'Rename failed'); }
  closeRenameModal();
}
document.getElementById('rename-modal').addEventListener('click', (e) => {
  if (e.target.id === 'rename-modal') closeRenameModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeRenameModal();
  if (e.key === 'Enter' && _renameTarget) submitRenameModal();
});

/* ---- Hover-to-play tiles (library) ---- */
function initHoverTiles() {
  document.querySelectorAll('.tile[data-src]').forEach((tile) => {
    let video = null;
    const load = () => {
      if (video) return;
      video = document.createElement('video');
      video.className = 'hover-video';
      video.src = tile.dataset.src;
      video.muted = true; video.loop = true; video.playsInline = true; video.preload = 'none';
      tile.appendChild(video);
    };
    const play = () => { load(); tile.classList.add('playing'); video.play().catch(() => {}); };
    const stop = () => { if (!video) return; tile.classList.remove('playing'); video.pause(); try { video.currentTime = 0; } catch (e) {} };
    tile.addEventListener('mouseenter', play);
    tile.addEventListener('mouseleave', stop);
  });
}
document.addEventListener('DOMContentLoaded', initHoverTiles);
</script>
</body>
</html>
