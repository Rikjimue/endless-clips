{% extends "base.html" %}
{% block title %}Clip — Endless Clips{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
{% endblock %}
{% block body %}
<div class="share-shell">
  <div class="share-media">
    <video id="player" playsinline controls autoplay>
      <source src="/media/{{ subdir }}/{{ clip.filename }}" type="video/mp4">
    </video>
  </div>
  <div class="share-brand"><span class="dot"></span>Endless Clips</div>
</div>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>new Plyr('#player');</script>
{% endblock %}
