{% extends "base.html" %}
{% block title %}{{ clip.display_name or 'Clip' }} — Endless Clips{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
{% endblock %}
{% block body %}
<div class="share-shell">
  <div class="share-media">
    {% if clip.display_name %}<div class="share-title">{{ clip.display_name }}</div>{% endif %}
    <video id="player" playsinline controls autoplay>
      <source src="/media/{{ subdir }}/{{ clip.filename }}" type="video/mp4">
    </video>
    <div class="share-download">
      <a href="/media/{{ subdir }}/{{ clip.filename }}" class="btn btn-outline btn-sm" download>Download</a>
    </div>
  </div>
  <div class="share-brand">Endless Clips</div>
</div>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>new Plyr('#player');</script>
{% endblock %}
